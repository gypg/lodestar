name: docker

# 在 quality（lint + test + build 全绿）成功完成后，才构建并推送镜像到 GHCR。
# 服务器侧无需在弱机上 build，直接 docker pull ghcr.io/gypg/lodestar:latest 即可部署。
#
# 为什么用 workflow_run 而不是直接 push 触发：保证只有通过测试的提交才会产出镜像，
# 避免"编译能过但测试挂"的坏代码被推上 GHCR。手动 workflow_dispatch 也可随时重跑。
on:
  workflow_run:
    workflows: ["quality"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build & push image
    # workflow_run 会在 quality 成功或失败时都触发，这里只在成功时构建；
    # 手动 workflow_dispatch 时跳过该判断直接构建。
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (the exact commit quality validated)
        uses: actions/checkout@v5
        with:
          # workflow_run 时取 quality 实际校验的那个提交；手动触发时取分支 tip。
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # 目标服务器是 x86_64，只建 amd64 以省构建时间（tagged release 仍走多架构）。
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=dev-${{ github.event.workflow_run.head_sha || github.sha }}
            GIT_COMMIT=${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Image digest
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull on the server:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** ${{ steps.meta.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
