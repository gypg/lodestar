# =============================================================================
# Lodestar 生产部署（PostgreSQL + Redis 全栈）
#
# 复用服务器现有基础设施（与旧 newapi 同款）：
#   - PostgreSQL @ 172.16.0.87:5432 → 为 Lodestar 新建独立库 `lodestar` + 独立角色（新鲜密码）
#   - Redis      @ 172.16.0.87:6379 → 用独立 db 索引（旧 newapi 用 /1，Lodestar 用 /2）
#
# 镜像由 CI 构建并推到 GHCR（.github/workflows/docker.yml，quality 全绿后才推），
# 服务器侧不 build——直接 pull。所有密钥走 .env（不入 git）。
# 用法：cp .env.example .env && 填值 → docker compose pull && docker compose up -d
# To update: change image tag to sha-<commit>, then docker compose up -d
# To rollback: change image tag to previous sha-<commit>, then docker compose up -d
# 详见 docs/DEPLOY.md「生产全栈」。
# =============================================================================
services:
  lodestar:
    # CI 构建的多阶段镜像（非 root + healthcheck + 前端嵌入二进制）。
    # 弱服务器无需 build，pull 即用。版本钉 sha-<commit> 可回滚，:latest 跟最新 main。
    image: ghcr.io/gypg/lodestar:sha-31e7fdc
    container_name: lodestar
    restart: unless-stopped
    pull_policy: missing
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # 容器时区；海外部署可改为显式 IANA 时区名，例如 America/Los_Angeles
      TZ: "Asia/Shanghai"
    # PG/Redis 为外部服务（172.16.0.87），无 depends_on。
    # 容器需能路由到 172.16.0.87——旧 newapi 容器在同主机已验证可达，Lodestar 同法部署即可。
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/bootstrap/status"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    # ---- B-12 容器安全加固 ----
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    read_only: true
    tmpfs:
      - /tmp

