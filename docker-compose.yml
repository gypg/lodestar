# =============================================================================
# Lodestar 生产部署（PostgreSQL + Redis 全栈）
#
# 复用服务器现有基础设施（与旧 newapi 同款）：
#   - PostgreSQL @ 172.16.0.87:5432 → 为 Lodestar 新建独立库 `lodestar` + 独立角色（新鲜密码）
#   - Redis      @ 172.16.0.87:6379 → 用独立 db 索引（旧 newapi 用 /1，Lodestar 用 /2）
#
# 所有密钥走 .env（不入 git）：cp .env.example .env && 填值
# 首次：docker compose up -d --build
# 详见 docs/DEPLOY.md「生产全栈」。
# =============================================================================
services:
  lodestar:
    build:
      context: .
      args:
        APP_VERSION: dev
    image: lodestar:latest
    container_name: lodestar
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # 容器时区；海外部署可改为显式 IANA 时区名，例如 America/Los_Angeles
      TZ: "Asia/Shanghai"
    # PG/Redis 为外部服务（172.16.0.87），无 depends_on。
    # 容器需能路由到 172.16.0.87——旧 newapi 容器在同主机已验证可达，Lodestar 同法部署即可。
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/bootstrap/status"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

